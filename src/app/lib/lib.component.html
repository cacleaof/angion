<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="navegarParaHome()" color="primary" aria-label="Voltar para Home" class="mobile-button">
    Home
      </ion-button>
    </ion-buttons>
    <ion-title>
        <span>Biblioteca </span>
        <ion-button (click)="addLib()" color="primary" aria-label="Adicionar Biblioteca" class="mobile-button">
          Adicionar
        </ion-button>
        <ion-searchbar
        placeholder="Buscar biblioteca..." 
        (ionInput)="filtrarPorBusca($event)" 
        debounce="300">
        </ion-searchbar>
    </ion-title>
  </ion-toolbar>
</ion-header>
<ion-list *ngFor="let lib of libsFiltradas">
<ion-item (click)="selecionar(lib)">
<h4>{{ lib.nome }}</h4>
<p>- descricao: {{ lib.descricao }}</p>
<a href="{{ lib.imagem }}" target="_blank"> -{{ lib.imagem }}</a>
</ion-item>
</ion-list>
